<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f1f5f9;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    h1 { font-size: 1.5rem; color: #1e293b; margin-bottom: 0.5rem; }
    p  { font-size: 0.9rem; color: #64748b; margin-bottom: 2rem; }
    .btn-google {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1.5rem;
      border: 1px solid #dadce0;
      border-radius: 8px;
      background: #fff;
      color: #3c4043;
      font-size: 0.95rem;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .btn-google:hover {
      background: #f8fafc;
      box-shadow: 0 1px 6px rgba(0,0,0,.12);
    }
    .btn-google svg { flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sign in</h1>
    <p>Use your Google account to continue.</p>
    <a href="/auth/google" class="btn-google">
      <!-- Google "G" logo SVG (official brand asset, no external fetch) -->
      <svg width="20" height="20" viewBox="0 0 48 48" aria-hidden="true">
        <path fill="#4285F4" d="M44.5 20H24v8.5h11.7C34.2 33.6 29.6 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 6 1.1 8.2 3l6-6C34.3 5.1 29.4 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21c10.8 0 20.3-7.8 20.3-21 0-1.3-.1-2.7-.3-4z"/>
        <path fill="#34A853" d="M6.3 14.7l7 5.1C15 16.1 19.1 13 24 13c3.1 0 6 1.1 8.2 3l6-6C34.3 5.1 29.4 3 24 3c-7.7 0-14.3 4.4-17.7 11.7z"/>
        <path fill="#FBBC05" d="M24 45c5.4 0 10.3-1.9 14.1-5.1l-6.5-5.3C29.6 36.1 26.9 37 24 37c-5.5 0-10.2-3.4-11.7-8.3l-7 5.4C8.6 41.1 15.7 45 24 45z"/>
        <path fill="#EA4335" d="M44.5 20H24v8.5h11.7c-.8 2.3-2.3 4.3-4.3 5.7l6.5 5.3c3.8-3.5 6.1-8.7 6.1-15.5 0-1.3-.1-2.7-.3-4z"/>
      </svg>
      Se connecter avec Google
    </a>
  </div>
</body>
</html>
