<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in</title>
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f5f5f5; }
    .card { background: #fff; padding: 2.5rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.12); text-align: center; }
    h1 { margin: 0 0 1.5rem; font-size: 1.4rem; color: #222; }
    .google-btn { display: inline-flex; align-items: center; gap: .75rem; padding: .7rem 1.4rem; border: 1px solid #dadce0; border-radius: 4px; background: #fff; font-size: 1rem; color: #3c4043; cursor: pointer; text-decoration: none; transition: box-shadow .15s; }
    .google-btn:hover { box-shadow: 0 1px 4px rgba(0,0,0,.2); }
    .google-btn svg { flex-shrink: 0; }
    .error { margin-top: 1rem; color: #c62828; font-size: .9rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Welcome</h1>
    <a class="google-btn" href="/auth/google" id="sso-btn">
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.859-3.048.859-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </a>
    <div class="error" id="error-msg"></div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('error')) {
      document.getElementById('error-msg').textContent = 'Sign-in failed: ' + params.get('error');
    }
  </script>
</body>
</html>
