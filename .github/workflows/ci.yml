name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      # TEMPORARY — S1 variant V2: force CI failure to validate the "tests failed"
      # vocal path + no-auto-merge. Remove after V2 is validated.
      - name: Force failure (V2 test)
        run: exit 1
